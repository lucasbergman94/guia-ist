<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ENKA Istanbul · New Teacher Guide (2026–27)</title>
<meta name="description" content="A warm, step-by-step companion for new ENKA teachers moving to Istanbul." />
<link rel="icon" type="image/png" href="./assets/favicon.png" />

<style>
  .topbar .tlink{margin:0 2px}
  /* hero (rectangular, full-bleed) */
  .hero{position:relative;color:#fff;overflow:hidden}
  .hero .bg{position:absolute;inset:0;background:url('./assets/hero-istanbul.jpg') center 58%/cover no-repeat}
  .hero .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(1,14,40,.34),rgba(1,18,52,.80))}
  .hero .inner{position:relative;max-width:1200px;margin:0 auto;padding:52px 24px 42px}
  .hero .eye{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--warm-soft)}
  .hero h1{font-weight:700;letter-spacing:-.035em;line-height:1.03;margin:10px 0 0}
  .hero h1 .l1{display:block;font-size:clamp(34px,7vw,60px)}
  .hero h1 .l2{display:block;font-size:clamp(26px,5vw,46px);font-weight:600;color:rgba(255,255,255,.96);margin-top:2px}
  .hero p{font-size:clamp(15px,3.6vw,19px);margin-top:14px;max-width:540px;color:rgba(255,255,255,.92);text-wrap:balance}
  .hero .chip{display:inline-flex;align-items:center;gap:7px;margin-top:18px;color:#fff;background:rgba(1,20,52,.5);
    border:1px solid rgba(255,255,255,.38);backdrop-filter:blur(8px);border-radius:var(--r-pill);padding:8px 14px;font-size:.84rem;font-weight:600}
  /* journey */
  .journey{margin-top:26px}
  .journey h2{font-size:clamp(20px,4.5vw,26px);font-weight:600;letter-spacing:-.02em}
  .journey .hint{color:var(--mut);font-size:.86rem;margin-top:2px}
  .jtrack{display:flex;gap:0;margin-top:16px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
  .jtrack::-webkit-scrollbar{display:none}
  .jstep{flex:1 0 auto;min-width:90px;background:none;border:0;cursor:pointer;font:inherit;color:var(--mut);display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;padding:4px 6px}
  .jstep::before{content:"";position:absolute;top:15px;left:-50%;width:100%;height:2px;background:var(--bd);z-index:0}
  .jstep:first-child::before{display:none}
  .jstep .jdot{position:relative;z-index:1;width:32px;height:32px;border-radius:50%;background:var(--card);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:15px;transition:.2s}
  .jstep .jlabel{font-size:.74rem;font-weight:600;text-align:center;line-height:1.1}
  .jstep.past .jdot{background:var(--acc);border-color:var(--acc);color:#fff}
  .jstep.past::before{background:var(--acc)}
  .jstep.cur .jdot{background:var(--warm);border-color:var(--warm);color:#231400;box-shadow:0 0 0 5px color-mix(in srgb,var(--warm) 28%,transparent)}
  .jstep.cur .jlabel{color:var(--txt)}
  /* phase card, uses full card width */
  .pcard{margin-top:20px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);box-shadow:var(--shadow);padding:22px 24px 24px}
  .pcard .phere{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--warm)}
  .pcard h3{font-size:clamp(22px,5vw,30px);font-weight:600;letter-spacing:-.025em;margin:4px 0 0;display:flex;align-items:center;gap:10px}
  .pcard .pnow{color:var(--mut);font-size:1rem;margin-top:10px;line-height:1.55}
  .pcard .pnormal{margin:16px 0;background:color-mix(in srgb,var(--warm) 12%,transparent);border:1px solid color-mix(in srgb,var(--warm) 38%,transparent);border-radius:14px;padding:13px 16px;font-size:.93rem;line-height:1.5}
  .pcard .steps-t{font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin:18px 0 6px}
  ul.todo{list-style:none;padding:0;margin:0}
  ul.todo li{position:relative;padding:9px 0 9px 32px;font-size:.97rem;border-top:1px solid var(--bd)}
  ul.todo li:first-child{border-top:0}
  ul.todo li>span.cbx{position:absolute;left:0;top:9px;width:20px;height:20px;border:1.5px solid var(--mut);border-radius:6px;cursor:pointer}
  ul.todo li.done>span.cbx{background:var(--acc);border-color:var(--acc)}
  ul.todo li.done>span.cbx::after{content:"✓";color:#fff;font-size:13px;position:absolute;left:4px;top:-1px}
  ul.todo li.done{color:var(--mut);text-decoration:line-through}
  .ptools{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .pmuted{margin-top:14px;color:var(--mut);font-size:.86rem}.pmuted a{color:var(--acc);font-weight:600}
  /* quick row: equal-height cards */
  .quick{display:flex;flex-direction:column;gap:14px;margin-top:24px}
  @media(min-width:780px){.quick{display:grid;grid-template-columns:1.4fr 1fr;align-items:stretch}}
  .board{padding:16px 18px;background:linear-gradient(165deg,color-mix(in srgb,var(--acc) 8%,var(--card)),var(--card));display:flex;flex-direction:column}
  .board h2{font-size:.92rem;display:flex;align-items:center;gap:8px}
  .msg{border-top:1px solid var(--bd);padding:10px 0}.msg:first-of-type{border-top:0;padding-top:8px}
  .msg .mt{font-weight:600;font-size:.92rem}.msg .md{color:var(--mut);font-size:.72rem;margin-left:8px;font-weight:500}
  .msg .mb{color:var(--mut);font-size:.88rem;margin-top:3px;line-height:1.5}
  .ccard{padding:16px 18px;display:flex;flex-direction:column;height:100%}
  .ccard .ct{font-size:.74rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mut)}
  .ccard .nm{font-weight:600;font-size:1.05rem;margin-top:4px}
  .ccard .role{color:var(--mut);font-size:.82rem;margin:2px 0 0}
  .ccard .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto;padding-top:14px}
  .cbtn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--r-pill);padding:9px 14px;font-size:.84rem;font-weight:600}
  .cbtn.wa{background:#25d366;color:#06301a}.cbtn.mail{background:var(--card2);color:var(--txt);border:1px solid var(--bd)}
  /* browse */
  .browseall{margin-top:24px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);box-shadow:var(--shadow);overflow:hidden}
  .browseall>summary{cursor:pointer;list-style:none;padding:16px 18px;font-weight:600;font-size:1rem;display:flex;align-items:center;justify-content:space-between}
  .browseall>summary::-webkit-details-marker{display:none}
  .browseall>summary .chev{color:var(--mut);transition:transform .25s var(--ease)}
  .browseall[open]>summary .chev{transform:rotate(90deg)}.browseall[open]>summary{border-bottom:1px solid var(--bd)}
  .browsebody{padding:14px 16px}
  .seccols{display:flex;gap:14px;align-items:flex-start}
  .seccol{flex:1;min-width:0;display:flex;flex-direction:column}
  @media(max-width:820px){.seccols{flex-direction:column;gap:0}}
  details.section{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;margin:0 0 12px;overflow:hidden;scroll-margin-top:70px}
  details.section>summary{cursor:pointer;list-style:none;padding:13px 15px;font-weight:600;font-size:.95rem;display:flex;align-items:center;justify-content:space-between;gap:10px}
  details.section>summary::-webkit-details-marker{display:none}
  details.section>summary .chev{color:var(--mut);transition:transform .25s var(--ease)}
  details.section[open]>summary .chev{transform:rotate(90deg)}details.section[open]>summary{border-bottom:1px solid var(--bd)}
  .body{padding:8px 16px 14px;font-size:.92rem}
  .body h4{margin:12px 0 4px;font-size:.9rem;font-weight:600}
  .body p{color:var(--mut);margin:6px 0}.body ul{margin:6px 0;padding-left:20px;color:var(--mut)}.body li{margin:4px 0}.body a{color:var(--acc)}
  .body .todo2{list-style:none;padding-left:0}.body .todo2 li{position:relative;padding-left:24px}
  .body .todo2 li::before{content:"";position:absolute;left:0;top:3px;width:15px;height:15px;border:1.5px solid var(--mut);border-radius:5px}
  table.kv{width:100%;border-collapse:collapse;font-size:.87rem;margin:6px 0}
  table.kv td{border-top:1px solid var(--bd);padding:7px 4px;vertical-align:top}table.kv tr:first-child td{border-top:0}table.kv td:first-child{color:var(--mut);width:42%}
  @media(max-width:420px){.topbar{gap:8px;padding-left:12px;padding-right:12px}.brand .logo{height:26px}.langtog button{padding:5px 9px}}
</style>
</head>

  en:"<h4>Phase 1: Documents</h4><ul class='todo2'><li>Apostille diploma, transcripts, teaching cert and a 2-year experience letter (each separately).</li><li>Email color scans to HR. No Turkish translation needed.</li></ul><h4>Phase 2: Ministry pre-approval (Ön İzin)</h4><ul><li>The Ministry pre-approves your assignment before the work permit. HR submits it; this is the slowest part.</li></ul><h4>Phase 3: Work visa</h4><ul><li>Apply online, book at the Turkish mission where you reside or hold citizenship, and have HR check your form first.</li></ul><h4>Phase 4: Flights and arrival</h4><ul><li>Book your own flight (economy) into IST only after approval. Bringing a pet? Start the rabies titer test early.</li></ul><h4>Phase 5: First weeks</h4><ul><li>Turkish SIM (starts the 120-day IMEI clock), tax number, İstanbulkart, e-Devlet, bank, address registration.</li></ul>",
  tr:"<h4>Aşama 1: Belgeler</h4><ul class='todo2'><li>Diploma, transkript, öğretmenlik sertifikası ve 2 yıllık deneyim mektubunu apostilletin (her biri ayrı).</li><li>Renkli taramaları İK'ya e-postayla gönderin. Türkçe çeviri gerekmez.</li></ul><h4>Aşama 2: Bakanlık ön izni (Ön İzin)</h4><ul><li>Bakanlık, çalışma izninden önce atamanızı onaylar. İK gönderir; en yavaş kısım budur.</li></ul><h4>Aşama 3: Çalışma vizesi</h4><ul><li>Çevrimiçi başvurun, ikamet ettiğiniz veya vatandaşı olduğunuz ülkedeki Türk temsilciliğinden randevu alın ve formunuzu önce İK'ya kontrol ettirin.</li></ul><h4>Aşama 4: Uçuş ve varış</h4><ul><li>Yalnızca onaydan sonra IST'e kendi uçuşunuzu (ekonomi) alın. Evcil hayvan mı getiriyorsunuz? Kuduz titre testine erken başlayın.</li></ul><h4>Aşama 5: İlk haftalar</h4><ul><li>Türk SIM kart (120 günlük IMEI süresini başlatır), vergi numarası, İstanbulkart, e-Devlet, banka, adres kaydı.</li></ul>"}},
 {id:"sec-docs",col:1,title:{en:"📄 Documents & apostille",tr:"📄 Belgeler ve apostil"},body:{
  en:"<ul><li>Apostille (each separately): diploma, transcripts, teaching certificate, experience letter, and a police certificate if asked.</li><li>Experience letter: from your previous school, on letterhead, signed.</li><li><b>US:</b> via the issuing state's Secretary of State or the US Dept. of State (low cost).</li><li><b>Non-Hague country:</b> Ministry of Foreign Affairs, then the nearest Turkish mission.</li><li>Email color scans to HR. No physical originals, no Turkish translation (the school does it), and use a hard-copy apostille, not a digital one.</li><li>A simple doctor's note saying you are fit to work may also be requested.</li></ul>",
  tr:"<ul><li>Apostil (her biri ayrı): diploma, transkript, öğretmenlik sertifikası, deneyim mektubu ve istenirse adli sicil belgesi.</li><li>Deneyim mektubu: önceki okulunuzdan, antetli kağıtta, imzalı.</li><li><b>ABD:</b> belgeyi veren eyaletin Secretary of State'i veya ABD Dışişleri (düşük maliyet).</li><li><b>Lahey dışı ülke:</b> Dışişleri Bakanlığı, ardından en yakın Türk temsilciliği.</li><li>Renkli taramaları İK'ya e-postayla gönderin. Fiziksel orijinal yok, Türkçe çeviri yok (okul yapar) ve dijital değil basılı apostil kullanın.</li><li>Çalışmaya uygun olduğunuzu belirten basit bir doktor raporu da istenebilir.</li></ul>"}},
 {id:"sec-visa",col:1,title:{en:"🛂 The work visa (step by step)",tr:"🛂 Çalışma vizesi (adım adım)"},body:{
  en:"<p>Apply at <a href='https://www.konsolosluk.gov.tr/' target='_blank' rel='noopener'>konsolosluk.gov.tr</a>.</p><table class='kv'><tr><td>Type of visa</td><td>Work Visa</td></tr><tr><td>Purpose</td><td>Employment / Special Employment Purpose</td></tr><tr><td>Entries / stay</td><td>Single · 90 days</td></tr><tr><td>Travel costs</td><td>Host company</td></tr><tr><td>Host company</td><td>OZEL ENKA OKULLARI</td></tr><tr><td>Host email</td><td>melih.inan@enka.k12.tr</td></tr><tr><td>Address</td><td>Poligon Mah. Sarıyer Cad. No:121/1, 34460 Sarıyer İstanbul</td></tr><tr><td>Insurance</td><td>Yes, until 30 June 2027</td></tr><tr><td>Port of entry</td><td>Istanbul Airport (IST)</td></tr></table><ul><li>Use your own email in the personal sections. Check every field before submitting. Report the earliest appointment to HR and do not book until told.</li></ul>",
  tr:"<p><a href='https://www.konsolosluk.gov.tr/' target='_blank' rel='noopener'>konsolosluk.gov.tr</a> üzerinden başvurun.</p><table class='kv'><tr><td>Vize türü</td><td>Work Visa</td></tr><tr><td>Amaç</td><td>Employment / Special Employment Purpose</td></tr><tr><td>Giriş / kalış</td><td>Tek giriş · 90 gün</td></tr><tr><td>Seyahat masrafı</td><td>Host company</td></tr><tr><td>Ev sahibi kurum</td><td>OZEL ENKA OKULLARI</td></tr><tr><td>Kurum e-postası</td><td>melih.inan@enka.k12.tr</td></tr><tr><td>Adres</td><td>Poligon Mah. Sarıyer Cad. No:121/1, 34460 Sarıyer İstanbul</td></tr><tr><td>Sigorta</td><td>Evet, 30 Haziran 2027'ye kadar</td></tr><tr><td>Giriş noktası</td><td>İstanbul Havalimanı (IST)</td></tr></table><ul><li>Kişisel bölümlerde kendi e-postanızı kullanın. Göndermeden önce her alanı kontrol edin. En erken randevuyu İK'ya bildirin ve denmeden randevu almayın.</li></ul>"}},
 {id:"sec-housing",col:1,title:{en:"🏠 Housing & commute",tr:"🏠 Konut ve ulaşım"},body:{
  en:"<p><a href='./map.html'>Open the interactive map</a></p><ul><li>Walking distance: İstinye, Maslak, Emirgan (Sarıyer). The bus runs from 9 stops.</li><li><a href='https://www.sahibinden.com/en' target='_blank' rel='noopener'>sahibinden.com/en</a> and <a href='https://www.hepsiemlak.com/en' target='_blank' rel='noopener'>hepsiemlak.com/en</a>. Sahibinden needs a Turkish number to message agents, so use the 'call' button, then WhatsApp.</li><li>Furnished is scarce. Do not pay a year upfront for an unseen place. Many use an Airbnb first and view in person.</li></ul>",
  tr:"<p><a href='./map.html'>Etkileşimli haritayı açın</a></p><ul><li>Yürüme mesafesi: İstinye, Maslak, Emirgan (Sarıyer). Servis 9 duraktan kalkar.</li><li><a href='https://www.sahibinden.com/en' target='_blank' rel='noopener'>sahibinden.com/en</a> ve <a href='https://www.hepsiemlak.com/en' target='_blank' rel='noopener'>hepsiemlak.com/en</a>. Sahibinden'de emlakçıya mesaj atmak için Türk numarası gerekir; 'ara' düğmesini kullanıp sonra WhatsApp'tan yazın.</li><li>Eşyalı seçenek azdır. Görmediğiniz bir yer için bir yıllık peşin ödemeyin. Çoğu kişi önce Airbnb'de kalıp yerinde görüyor.</li></ul>"}},
 {id:"sec-arrival",col:1,title:{en:"🧰 Arrival setup",tr:"🧰 Varış kurulumu"},body:{
  en:"<ul><li><b>Tax number (vergi numarası):</b> free, online.</li><li><b>e-Devlet:</b> get the password at a PTT.</li><li><b>Bank:</b> passport, tax number, address, contract.</li><li><b>SIM:</b> register your IMEI within 120 days or buy a local phone.</li><li><b>İstanbulkart</b> and <b>address registration (adres kayıt)</b>.</li></ul>",
  tr:"<ul><li><b>Vergi numarası:</b> ücretsiz, çevrimiçi.</li><li><b>e-Devlet:</b> şifreyi PTT'den alın.</li><li><b>Banka:</b> pasaport, vergi numarası, adres, sözleşme.</li><li><b>SIM:</b> IMEI'nizi 120 gün içinde kaydedin ya da yerel telefon alın.</li><li><b>İstanbulkart</b> ve <b>adres kaydı</b>.</li></ul>"}},
 {id:"sec-daily",col:2,title:{en:"🌆 Daily life in Istanbul",tr:"🌆 İstanbul'da günlük yaşam"},body:{
  en:"<ul><li>Transport: metro, metrobüs, ferries (İstanbulkart) and the school bus.</li><li>Apps: Moovit, BiTaksi, Yemeksepeti/Getir, Google Translate (offline Turkish).</li><li>Pets: rabies titer test to enter. Sport: ENKA teacher discount. Emergency: 112.</li></ul>",
  tr:"<ul><li>Ulaşım: metro, metrobüs, vapur (İstanbulkart) ve servis.</li><li>Uygulamalar: Moovit, BiTaksi, Yemeksepeti/Getir, Google Çeviri (çevrimdışı Türkçe).</li><li>Evcil hayvan: girişte kuduz titre testi. Spor: ENKA öğretmen indirimi. Acil: 112.</li></ul>"}},
 {id:"sec-school",col:2,title:{en:"🏫 The school (ENKA)",tr:"🏫 Okul (ENKA)"},body:{
  en:"<ul><li><b>Address:</b> Poligon Mah. Sarıyer Cad. No:121/1, 34460 Sarıyer, İstanbul.</li><li><b>First day:</b> Thursday, 20 August 2026.</li><li>Onboarding: monthly newsletter, asynchronous trainings, optional online meetups.</li></ul>",
  tr:"<ul><li><b>Adres:</b> Poligon Mah. Sarıyer Cad. No:121/1, 34460 Sarıyer, İstanbul.</li><li><b>İlk gün:</b> 20 Ağustos 2026, Perşembe.</li><li>Oryantasyon: aylık bülten, eşzamansız eğitimler, isteğe bağlı çevrimiçi buluşmalar.</li></ul>"}},
 {id:"sec-faq",col:2,title:{en:"❓ FAQ",tr:"❓ SSS"},body:{
  en:"<ul><li><b>Is the visa wait normal?</b> Yes, often weeks; the Ministry controls it and the school tracks it.</li><li><b>Translate documents?</b> No, the school does it. You only apostille.</li><li><b>When to book flights?</b> After approval, into IST.</li><li><b>Furnished?</b> Rare, so plan to furnish (an IKEA run is available).</li></ul>",
  tr:"<ul><li><b>Vize beklemesi normal mi?</b> Evet, genelde haftalar sürer; süreç Bakanlığa bağlı ve okul takip ediyor.</li><li><b>Belge çevirisi?</b> Hayır, okul yapar. Siz sadece apostil yaptırırsınız.</li><li><b>Uçuş ne zaman alınır?</b> Onaydan sonra, IST'e.</li><li><b>Eşyalı?</b> Nadir, bu yüzden döşemeyi planlayın (servisle IKEA turu var).</li></ul>"}},
 {id:"sec-glossary",col:2,title:{en:"📖 Glossary",tr:"📖 Sözlük"},body:{
  en:"<table class='kv'><tr><td>Apostille</td><td>International certification of a public document</td></tr><tr><td>Ön İzin</td><td>Ministry of Education pre-approval for a foreign teacher</td></tr><tr><td>Çalışma izni / İkamet</td><td>Work permit / residence permit (the permit covers residence)</td></tr><tr><td>Vergi numarası</td><td>Tax number</td></tr><tr><td>e-Devlet · Adres kayıt</td><td>Government portal · address registration</td></tr><tr><td>İstanbulkart · Eczane</td><td>Transit card · pharmacy</td></tr></table>",
  tr:"<table class='kv'><tr><td>Apostil</td><td>Resmi bir belgenin uluslararası onayı</td></tr><tr><td>Ön İzin</td><td>Yabancı öğretmen için MEB ön onayı</td></tr><tr><td>Çalışma izni / İkamet</td><td>Çalışma izni / ikamet (izin, ikameti de kapsar)</td></tr><tr><td>Vergi numarası</td><td>Vergi kimlik numarası</td></tr><tr><td>e-Devlet · Adres kayıt</td><td>Devlet portalı · adres kaydı</td></tr><tr><td>İstanbulkart · Eczane</td><td>Ulaşım kartı · eczane</td></tr></table>"}},
 {id:"sec-hr",col:2,title:{en:"🙋 What we still need from HR",tr:"🙋 İK'dan hâlâ ihtiyacımız olanlar"},body:{
  en:"<ul class='todo2'><li>Who pays the real-estate agent's commission, and how much?</li><li>Driving: a foreign license, an international permit, or a Turkish license?</li><li>Exact pet import requirements (titer timing, in-cabin).</li><li>The service-bus schedule and pickup times.</li></ul>",
  tr:"<ul class='todo2'><li>Emlakçı komisyonunu kim öder ve ne kadar?</li><li>Ehliyet: yabancı ehliyet, uluslararası izin veya Türk ehliyeti?</li><li>Evcil hayvan getirme şartları (titre zamanı, kabin içi).</li><li>Servis saatleri ve kalkış noktaları.</li></ul>"}}
];

/* ---------- state + render ---------- */
var LANG="en";try{var s=localStorage.getItem("enka-lang");if(s==="tr"||s==="en")LANG=s;}catch(e){}
document.documentElement.lang=LANG;
var curPhase="just-hired"; /* item 5: always start at Hired on load */
var contactsData=null,messagesData=null;
function t(k){return T[LANG][k];}
function idxOf(id){for(var i=0;i<PHASES.length;i++)if(PHASES[i].id===id)return i;return -1;}
function doneKey(pid,i){return "enka-todo-"+pid+"-"+i;}
function isInternal(h){return h.charAt(0)==="#";}
function setTxt(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function setHtml(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v;}

function renderStepper(sel){document.querySelectorAll(".jstep").forEach(function(b,i){b.classList.toggle("cur",i===sel);b.classList.toggle("past",sel>-1&&i<sel);});}
function renderPhase(){
  var i=idxOf(curPhase);var p=PHASES[i];renderStepper(i);
  document.getElementById("phaseview").innerHTML='<div class="pcard">'+
    '<div class="phere">'+t("youAreHere")+'</div>'+
    '<h3>'+p.icon+' '+p.title[LANG]+'</h3>'+
    '<div class="pnow">'+p.now[LANG]+'</div>'+
    (p.normal[LANG]?'<div class="pnormal">'+p.normal[LANG]+'</div>':'')+
    '<div class="steps-t">'+t("nextSteps")+'</div>'+
    '<ul class="todo">'+p.todo[LANG].map(function(tx,j){var d=false;try{d=localStorage.getItem(doneKey(p.id,j))==="1";}catch(e){}return '<li data-i="'+j+'"'+(d?' class="done"':'')+'><span class="cbx"></span>'+tx+'</li>';}).join('')+'</ul>'+
    '<div class="ptools">'+p.tools.map(function(tl){return '<a class="btn'+(isInternal(tl.href)?' ghost':'')+'" href="'+tl.href+'">'+tl.label[LANG]+(isInternal(tl.href)?' ›':' →')+'</a>';}).join('')+'</div>'+
    '<div class="pmuted">'+t("stuck")+'</div></div>';
  document.querySelectorAll("#phaseview li").forEach(function(li){li.querySelector(".cbx").addEventListener("click",function(){var j=li.getAttribute("data-i");li.classList.toggle("done");try{localStorage.setItem(doneKey(p.id,j),li.classList.contains("done")?"1":"0");}catch(e){}});});
  var ao=document.querySelector("#phaseview .askopen");if(ao)ao.addEventListener("click",function(e){e.preventDefault();var f=document.querySelector(".ask-fab");if(f)f.click();});
}
function renderBrowse(){
  var c1=document.getElementById("col1"),c2=document.getElementById("col2");c1.innerHTML="";c2.innerHTML="";
  SECTIONS.forEach(function(sx){
    var d='<details class="section" id="'+sx.id+'"><summary><span>'+sx.title[LANG]+'</span><span class="chev">›</span></summary><div class="body">'+sx.body[LANG]+'</div></details>';
    (sx.col===1?c1:c2).insertAdjacentHTML("beforeend",d);
  });
}
function renderBoard(){
  if(!messagesData){setHtml("board",'<h2>'+t("board")+'</h2>');return;}
  var msgs=messagesData.slice().sort(function(a,b){return (b.pinned?1:0)-(a.pinned?1:0);});
  setHtml("board",'<h2>'+t("board")+'</h2>'+(msgs.length?msgs.map(function(m){return '<div class="msg"><span class="mt">'+(m.pinned?'📌 ':'')+(m.title||'')+'</span><span class="md">'+(m.date||'')+'</span><div class="mb">'+(m.body||'')+'</div></div>';}).join(''):''));
}
function renderContacts(){
  var w=document.getElementById("contacts-wrap");
  if(!contactsData){w.style.display="none";return;}
  w.style.display="";
  setHtml("contacts",contactsData.map(function(c){return '<div class="ccard"><div class="ct">'+t("hrContact")+'</div><div class="nm">'+c.name+'</div><div class="role">'+t("hrRole")+'</div><div class="btns">'+(c.whatsapp?'<a class="cbtn wa" target="_blank" rel="noopener" href="https://wa.me/'+c.whatsapp+'">💬 WhatsApp</a>':'')+(c.email?'<a class="cbtn mail" href="mailto:'+c.email+'">✉️ '+c.email+'</a>':'')+'</div></div>';}).join(''));
}
function renderAll(){
  document.documentElement.lang=LANG;
  setTxt("navmap",t("map"));
  setTxt("heroEye",t("heroEye"));setTxt("heroL1",t("heroL1"));setTxt("heroL2",t("heroL2"));setTxt("heroP",t("heroP"));setTxt("heroChip",t("heroChip"));
  setTxt("whereTitle",t("whereTitle"));setTxt("whereHint",t("whereHint"));
  setTxt("browseSummary",t("browse"));setHtml("foot",t("foot"));
  document.querySelectorAll("#langtog button").forEach(function(b){b.classList.toggle("on",b.dataset.lang===LANG);});
  renderPhase();renderBrowse();renderBoard();renderContacts();
}
function setLang(l){LANG=l;try{localStorage.setItem("enka-lang",l);}catch(e){}renderAll();}

/* build stepper once */
(function(){
  var tr=document.getElementById("jtrack");
  tr.innerHTML=PHASES.map(function(p){return '<button class="jstep" type="button" data-phase="'+p.id+'"><span class="jdot">'+p.icon+'</span><span class="jlabel" data-lab="'+p.id+'"></span></button>';}).join('');
  tr.querySelectorAll(".jstep").forEach(function(b){b.addEventListener("click",function(){curPhase=b.dataset.phase;renderPhase();document.getElementById("phaseview").scrollIntoView({behavior:"smooth",block:"nearest"});});});
  document.getElementById("langtog").querySelectorAll("button").forEach(function(b){b.addEventListener("click",function(){setLang(b.dataset.lang);});});
})();
/* stepper labels need lang -> set within renderStepper labels; do it in renderAll via jlabel */
function setStepLabels(){document.querySelectorAll(".jlabel").forEach(function(s){var id=s.getAttribute("data-lab");var p=PHASES[idxOf(id)];s.textContent=p.label[LANG];});}
var _renderAll=renderAll;renderAll=function(){_renderAll();setStepLabels();};

function openHashTarget(){var h=location.hash;if(!h)return;var el;try{el=document.querySelector(h);}catch(e){return;}if(!el)return;
  /* auto-navigation: close sibling sections so only the linked one is open */
  document.querySelectorAll('details.section[open]').forEach(function(d){if(d!==el)d.open=false;});
  var p=el;while(p){if(p.tagName==="DETAILS")p.open=true;p=p.parentElement;}el.scrollIntoView({behavior:"smooth",block:"start"});}
window.addEventListener("hashchange",openHashTarget);

fetch('./contacts.json').then(function(r){return r.json();}).then(function(d){contactsData=d.contacts||[];renderContacts();}).catch(function(){var w=document.getElementById("contacts-wrap");if(w)w.style.display="none";});
fetch('./messages.json').then(function(r){return r.json();}).then(function(d){messagesData=d.messages||[];renderBoard();}).catch(function(){});

renderAll();
window.addEventListener("DOMContentLoaded",openHashTarget);
</script>
<script src="./theme.js"></script>
<script src="./assistant.js"></script>
</body>
</html>
